<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Gestadia — Estamos renovando</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232c2c2c'/%3E%3Ctext x='8' y='23' font-family='Georgia,serif' font-size='23' font-weight='700' fill='%23fff'%3Eg%3C/text%3E%3Ccircle cx='23.5' cy='21' r='2.8' fill='%23c0392b'/%3E%3C/svg%3E">
  <style>
    :root { --red: #c0392b; --graphite: #2c2c2c; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--graphite);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .card { max-width: 560px; }
    .logo {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -.5px;
      margin-bottom: 40px;
    }
    .logo span { color: var(--red); }
    h1 { font-size: 30px; font-weight: 700; line-height: 1.25; margin-bottom: 16px; }
    p { font-size: 17px; line-height: 1.6; color: #c9c9c9; margin-bottom: 10px; }
    .dots { display: inline-flex; gap: 9px; margin-top: 30px; }
    .dots i {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--red); opacity: .3;
      animation: pulse 1.2s infinite ease-in-out;
    }
    .dots i:nth-child(2) { animation-delay: .2s; }
    .dots i:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: .25; transform: scale(.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .foot { margin-top: 46px; font-size: 14px; color: #8a8a8a; }
    .foot a { color: #e0e0e0; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">gestadia<span>.</span></div>
    <h1>Estamos renovando la web</h1>
    <p>Estamos mejorando gestadia.com para ofrecerte un servicio mejor.</p>
    <p>Volvemos en unos minutos. Gracias por tu paciencia.</p>
    <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
    <!-- Cambia el email por tu dirección real de atención si no es info@gestadia.com -->
    <div class="foot">¿Necesitas ayuda? Escríbenos a <a href="mailto:info@gestadia.com">info@gestadia.com</a></div>
  </main>
</body>
</html>
